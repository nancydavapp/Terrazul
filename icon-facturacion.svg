<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Fondo navy redondeado -->
  <rect width="512" height="512" rx="90" fill="#0c0c59"/>
  
  <!-- Isotipo Terrazul: cuadrado blanco centrado arriba -->
  <rect x="156" y="90" width="200" height="200" rx="8" fill="#f2f2f2"/>
  
  <!-- T grande en navy dentro del cuadrado -->
  <rect x="196" y="120" width="120" height="22" rx="4" fill="#0c0c59"/>
  <rect x="245" y="142" width="22" height="108" rx="4" fill="#0c0c59"/>

  <!-- Texto TERRAZUL pequeño debajo del cuadrado -->
  <text x="256" y="340" 
    font-family="Arial, sans-serif" 
    font-size="42" 
    font-weight="700"
    fill="#f2f2f2" 
    text-anchor="middle"
    letter-spacing="4">TERRAZUL</text>
  
  <!-- Texto Facturación más pequeño -->
  <text x="256" y="400" 
    font-family="Arial, sans-serif" 
    font-size="34" 
    font-weight="400"
    fill="rgba(255,255,255,0.65)" 
    text-anchor="middle"
    letter-spacing="2">Facturación</text>

  <!-- Línea decorativa -->
  <rect x="176" y="355" width="160" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
</svg>